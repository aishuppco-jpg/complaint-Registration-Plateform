<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>UP Police Medical Reimbursement</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial;
            margin: 0;
            background: #eef2f7;
        }

        /* HEADER */
        header {
            background: linear-gradient(90deg, #0b3d91, #1a5fd1);
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* CONTAINER */
        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        /* CARD */
        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        /* INPUT */
        input {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* BUTTON */
        button {
            padding: 10px 15px;
            background: #0b3d91;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* NAME */
        .name-box {
            background: #0b3d91;
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 22px;
            border-radius: 8px;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #0b3d91;
            color: white;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <header>
        <h2>UP Police Medical Reimbursement System</h2>
    </header>

    <div class="container">

        <!-- SEARCH -->
        <div class="card">
            <h3>Search Employee</h3>
            <input id="pno" placeholder="Enter 9 Digit PNO">
            <button onclick="fetchData()">Search</button>
            <p id="error" class="error"></p>
        </div>

        <!-- ADD FORM -->
        <div id="formDiv" class="card hidden">

            <h3>Add Employee</h3>

            <div class="grid">
                <input id="f_name" placeholder="Name">
                <input id="f_district" placeholder="District">
                <input id="f_posting" placeholder="Posting">
                <input id="f_rank" placeholder="Rank">
            </div>

            <h4>Add Medical Record</h4>

            <div class="grid">
                <input id="f_year" placeholder="Year">
                <input id="f_month" placeholder="Month">
                <input id="f_date" placeholder="Date">
                <input id="f_claimed" placeholder="Claimed">
                <input id="f_passed" placeholder="Passed">
                <input id="f_disease" placeholder="Disease">
                <input id="f_hospital" placeholder="Hospital">
                <input id="f_type" placeholder="Type">
            </div>

            <button onclick="saveData()">Save Employee</button>

        </div>

        <div id="result"></div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>

        /* STORAGE */
        let employees = JSON.parse(localStorage.getItem("employees")) || {
            "123456789": {
                name: "Amit Kumar",
                district: "Lucknow",
                posting: "Cyber Cell",
                rank: "Inspector",
                records: [{ year: 2025, month: "March", date: "12-03-2025", claimed: 20000, passed: 18000, disease: "Fever", hospital: "SGPGI", type: "OPD" }]
            }
        };

        let currentPNO = "";

        /* SAVE TO STORAGE */
        function persist() {
            localStorage.setItem("employees", JSON.stringify(employees));
        }

        /* SEARCH */
        function fetchData() {

            let pno = document.getElementById("pno").value.trim();
            let error = document.getElementById("error");

            if (!/^\d{9}$/.test(pno)) {
                error.innerText = "Enter valid 9 digit PNO";
                return;
            }

            error.innerText = "";
            currentPNO = pno;

            if (!employees[pno]) {
                document.getElementById("formDiv").classList.remove("hidden");
                document.getElementById("result").innerHTML = "<p>Employee not found. Please add details.</p>";
                return;
            }

            renderEmployee(employees[pno]);
        }

        /* SAVE */
        function saveData() {

            if (!f_name.value) {
                alert("Name required");
                return;
            }

            employees[currentPNO] = {
                name: f_name.value,
                district: f_district.value,
                posting: f_posting.value,
                rank: f_rank.value,
                records: [{
                    year: f_year.value,
                    month: f_month.value,
                    date: f_date.value,
                    claimed: f_claimed.value,
                    passed: f_passed.value,
                    disease: f_disease.value,
                    hospital: f_hospital.value,
                    type: f_type.value
                }]
            };

            persist();

            document.getElementById("formDiv").classList.add("hidden");

            renderEmployee(employees[currentPNO]);
        }

        /* RENDER */
        function renderEmployee(emp) {

            let rows = emp.records.map(r => `
<tr>
<td>${r.year}</td>
<td>${r.month}</td>
<td>${r.date}</td>
<td>${r.claimed}</td>
<td>${r.passed}</td>
<td>${r.disease}</td>
<td>${r.hospital}</td>
<td>${r.type}</td>
</tr>`).join("");

            document.getElementById("result").innerHTML = `
<div class="card" id="printArea">

<div class="name-box">${emp.name}</div>

<div class="grid">
<p><b>District:</b> ${emp.district}</p>
<p><b>Posting:</b> ${emp.posting}</p>
<p><b>Rank:</b> ${emp.rank}</p>
<p><b>Total Records:</b> ${emp.records.length}</p>
</div>

<table>
<tr>
<th>Year</th><th>Month</th><th>Date</th><th>Claimed</th><th>Passed</th><th>Disease</th><th>Hospital</th><th>Type</th>
</tr>
${rows}
</table>

<br>
<button onclick="printData()">Print</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>`;
        }

        /* PRINT */
        function printData() {
            let w = window.open();
            w.document.write(document.getElementById("printArea").innerHTML);
            w.print();
        }

        /* PDF */
        function downloadPDF() {

            const { jsPDF } = window.jspdf;
            let doc = new jsPDF();

            const pageWidth = doc.internal.pageSize.getWidth();

            // ===== LOGO (BASE64 IMAGE) =====
            // You can replace with your own logo
            let logo = "https://upload.wikimedia.org/wikipedia/en/thumb/1/16/Uttar_Pradesh_Police_Logo.png/120px-Uttar_Pradesh_Police_Logo.png";

            // Convert image to base64 dynamically
            function getBase64Image(url, callback) {
                let img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = function () {
                    let canvas = document.createElement("canvas");
                    canvas.width = this.width;
                    canvas.height = this.height;
                    let ctx = canvas.getContext("2d");
                    ctx.drawImage(this, 0, 0);
                    let dataURL = canvas.toDataURL("image/png");
                    callback(dataURL);
                };
                img.src = url;
            }

            // MAIN PDF CONTENT
            getBase64Image(logo, function (base64Img) {

                // ===== BORDER =====
                doc.setLineWidth(0.5);
                doc.rect(5, 5, 200, 287);

                // ===== HEADER =====
                doc.setFillColor(11, 61, 145);
                doc.rect(5, 5, 200, 20, "F");

                // LOGO
                doc.addImage(base64Img, 'PNG', 8, 7, 12, 12);

                // TITLE
                doc.setTextColor(255, 255, 255);
                doc.setFont("helvetica", "bold");
                doc.setFontSize(14);
                doc.text("UTTAR PRADESH POLICE", pageWidth / 2, 14, { align: "center" });

                doc.setFontSize(10);
                doc.text("MEDICAL REIMBURSEMENT CLAIM FORM", pageWidth / 2, 20, { align: "center" });

                doc.setTextColor(0, 0, 0);

                // ===== EMPLOYEE SECTION =====
                let y = 32;
                let emp = employees[currentPNO];

                doc.setFont("helvetica", "bold");
                doc.text("1. Employee Details", 10, y);

                y += 4;
                doc.rect(8, y, 194, 42);

                doc.setFont("helvetica", "normal");

                doc.text("Name: " + emp.name, 12, y + 10);
                doc.text("PNO: " + currentPNO, 120, y + 10);

                doc.text("District: " + emp.district, 12, y + 20);
                doc.text("Rank: " + emp.rank, 120, y + 20);

                doc.text("Posting: " + emp.posting, 12, y + 30);

                // ===== TABLE =====
                y += 50;

                doc.setFont("helvetica", "bold");
                doc.text("2. Medical Reimbursement Details", 10, y);

                y += 5;

                const headers = ["Year", "Month", "Date", "Claimed", "Passed", "Disease", "Hospital", "Type"];
                const colX = [10, 25, 45, 65, 90, 115, 145, 175];

                // HEADER ROW
                doc.setFillColor(220, 230, 255);
                doc.rect(8, y, 194, 10, "F");

                doc.setFontSize(9);
                headers.forEach((h, i) => {
                    doc.text(h, colX[i], y + 7);
                });

                y += 10;

                doc.setFont("helvetica", "normal");

                let totalPassed = 0;

                // ROWS
                emp.records.forEach(r => {

                    if (y > 260) {
                        doc.addPage();
                        y = 20;
                    }

                    doc.rect(8, y, 194, 10);

                    doc.text(String(r.year), colX[0], y + 7);
                    doc.text(String(r.month), colX[1], y + 7);
                    doc.text(String(r.date), colX[2], y + 7);
                    doc.text(String(r.claimed), colX[3], y + 7);
                    doc.text(String(r.passed), colX[4], y + 7);

                    doc.text(doc.splitTextToSize(r.disease, 25), colX[5], y + 7);
                    doc.text(doc.splitTextToSize(r.hospital, 25), colX[6], y + 7);

                    doc.text(String(r.type), colX[7], y + 7);

                    totalPassed += Number(r.passed);

                    y += 10;

                });

                // ===== TOTAL ROW (ONLY PASSED) =====
                doc.setFont("helvetica", "bold");

                doc.rect(8, y, 194, 10);

                doc.text("TOTAL PASSED AMOUNT", 10, y + 7);
                doc.text(String(totalPassed), colX[4], y + 7);

                y += 20;

                // ===== DECLARATION =====
                doc.setFont("helvetica", "bold");
                doc.text("3. Declaration", 10, y);

                doc.setFont("helvetica", "normal");
                y += 8;

                doc.text(
                    doc.splitTextToSize(
                        "I hereby certify that the above information is true and correct.",
                        180
                    ),
                    10,
                    y
                );

                // ===== SIGNATURE =====
                y += 25;

                doc.rect(10, y, 80, 25);
                doc.rect(120, y, 80, 25);

                doc.text("Employee Signature", 20, y + 32);
                doc.text("Authorized Officer", 130, y + 32);

                // ===== QR CODE =====
                let qrData = `
Name: ${emp.name}
PNO: ${currentPNO}
District: ${emp.district}
Total Passed: ${totalPassed}
`;

                let qrCanvas = document.createElement("canvas");

                new QRCode(qrCanvas, {
                    text: qrData,
                    width: 100,
                    height: 100
                });

                // Convert QR to image
                let qrImg = qrCanvas.querySelector("img");

                setTimeout(() => {
                    doc.addImage(qrImg.src, 'PNG', 160, y + 5, 35, 35);

                    // FOOTER
                    doc.setFontSize(8);
                    doc.text("System Generated | UP Police", pageWidth / 2, 290, { align: "center" });

                    doc.save("Medical_Reimbursement_Form.pdf");
                }, 500);

            });
        }

    </script>

</body>

</html>
