<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>UP Police Medical Reimbursement</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #eef2f7;
        }

        header {
            background: #0b3d91;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 12px;
            background: #0b3d91;
            color: white;
            border: none;
            cursor: pointer;
        }

        .card {
            background: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
        }

        .name-box {
            background: #0b3d91;
            color: white;
            padding: 10px;
            text-align: center;
            font-size: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #0b3d91;
            color: white;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <header>
        <h2>UP Police Medical Reimbursement</h2>
    </header>

    <div class="container">

        <h3>Search Employee</h3>
        <input type="text" id="pno" placeholder="Enter PNO">
        <button onclick="fetchData()">Search</button>

        <!-- FORM -->
        <div id="formDiv" class="card hidden">
            <h3>Add New Employee</h3>

            <input id="f_name" placeholder="Name"><br>
            <input id="f_district" placeholder="District"><br>
            <input id="f_posting" placeholder="Posting"><br>
            <input id="f_rank" placeholder="Rank"><br>

            <h4>Medical Record</h4>
            <input id="f_year" placeholder="Year">
            <input id="f_month" placeholder="Month">
            <input id="f_date" placeholder="Date"><br>
            <input id="f_claimed" placeholder="Claimed">
            <input id="f_passed" placeholder="Passed"><br>
            <input id="f_disease" placeholder="Disease">
            <input id="f_hospital" placeholder="Hospital">
            <input id="f_type" placeholder="Type"><br>

            <button onclick="saveData()">Save Data</button>
        </div>

        <div id="result"></div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>

        let employees = {
            "123456789": {
                name: "Amit Kumar",
                district: "Lucknow",
                posting: "Cyber Cell",
                rank: "Inspector",
                records: [{ year: 2025, month: "March", date: "12-03-2025", claimed: 20000, passed: 18000, disease: "Fever", hospital: "SGPGI", type: "OPD" }]
            }
        };

        let currentPNO = "";

        // SEARCH
        function fetchData() {
            let pno = document.getElementById("pno").value;
            currentPNO = pno;

            let emp = employees[pno];

            if (!emp) {
                document.getElementById("formDiv").classList.remove("hidden");
                document.getElementById("result").innerHTML = "<p>PNO not found. Please add data.</p>";
                return;
            }

            showData(emp);
        }

        // SAVE
        function saveData() {

            employees[currentPNO] = {
                name: f_name.value,
                district: f_district.value,
                posting: f_posting.value,
                rank: f_rank.value,
                records: [{
                    year: f_year.value,
                    month: f_month.value,
                    date: f_date.value,
                    claimed: f_claimed.value,
                    passed: f_passed.value,
                    disease: f_disease.value,
                    hospital: f_hospital.value,
                    type: f_type.value
                }]
            };

            document.getElementById("formDiv").classList.add("hidden");

            showData(employees[currentPNO]);
        }

        // SHOW DATA (NEXT PAGE TYPE VIEW)
        function showData(emp) {

            let html = `
<div class="card" id="printArea">

<div class="name-box">${emp.name}</div>

<p><b>District:</b> ${emp.district}</p>
<p><b>Posting:</b> ${emp.posting}</p>
<p><b>Rank:</b> ${emp.rank}</p>

<table>
<tr>
<th>Year</th><th>Month</th><th>Date</th><th>Claimed</th><th>Passed</th><th>Disease</th><th>Hospital</th><th>Type</th>
</tr>
`;

            emp.records.forEach(r => {
                html += `
<tr>
<td>${r.year}</td>
<td>${r.month}</td>
<td>${r.date}</td>
<td>${r.claimed}</td>
<td>${r.passed}</td>
<td>${r.disease}</td>
<td>${r.hospital}</td>
<td>${r.type}</td>
</tr>`;
            });

            html += `</table>

<br>
<button onclick="printData()">Print</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>
`;

            document.getElementById("result").innerHTML = html;
        }

        // PRINT
        function printData() {
            let printContent = document.getElementById("printArea").innerHTML;
            let w = window.open();
            w.document.write(printContent);
            w.print();
        }

        // PDF
        function downloadPDF() {

            const { jsPDF } = window.jspdf;
            let doc = new jsPDF();

            // OUTER BORDER
            doc.setLineWidth(0.8);
            doc.rect(8, 8, 194, 280);

            // HEADER BOX
            doc.setFillColor(11, 61, 145);
            doc.rect(8, 8, 194, 20, "F");

            doc.setTextColor(255, 255, 255);
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text("UTTAR PRADESH POLICE", 105, 18, null, null, "center");

            doc.setFontSize(11);
            doc.text("MEDICAL REIMBURSEMENT CLAIM FORM", 105, 24, null, null, "center");

            doc.setTextColor(0, 0, 0);

            // SECTION 1: EMPLOYEE DETAILS BOX
            doc.setFontSize(11);
            doc.setFont("helvetica", "bold");
            doc.text("1. Employee Details", 14, 38);

            doc.rect(12, 42, 186, 40);

            doc.setFont("helvetica", "normal");

            doc.text("Name: " + employees[currentPNO].name, 15, 50);
            doc.text("PNO: " + currentPNO, 120, 50);

            doc.text("District: " + employees[currentPNO].district, 15, 58);
            doc.text("Rank: " + employees[currentPNO].rank, 120, 58);

            doc.text("Posting: " + employees[currentPNO].posting, 15, 66);

            // SECTION 2: MEDICAL DETAILS
            doc.setFont("helvetica", "bold");
            doc.text("2. Medical Reimbursement Details", 14, 90);

            let startY = 96;

            // TABLE HEADER BOX
            doc.setFillColor(220, 230, 255);
            doc.rect(12, startY, 186, 10, "F");

            doc.setFontSize(9);
            doc.text("Year", 15, startY + 7);
            doc.text("Month", 30, startY + 7);
            doc.text("Date", 50, startY + 7);
            doc.text("Claimed", 70, startY + 7);
            doc.text("Passed", 95, startY + 7);
            doc.text("Disease", 120, startY + 7);
            doc.text("Hospital", 150, startY + 7);
            doc.text("Type", 180, startY + 7);

            let y = startY + 10;

            // TABLE DATA ROWS
            employees[currentPNO].records.forEach(r => {

                doc.rect(12, y, 186, 10);

                doc.text(String(r.year), 15, y + 7);
                doc.text(String(r.month), 30, y + 7);
                doc.text(String(r.date), 50, y + 7);
                doc.text(String(r.claimed), 70, y + 7);
                doc.text(String(r.passed), 95, y + 7);
                doc.text(String(r.disease), 120, y + 7);
                doc.text(String(r.hospital), 150, y + 7);
                doc.text(String(r.type), 180, y + 7);

                y += 10;
            });

            // SECTION 3: DECLARATION
            y += 15;

            doc.setFont("helvetica", "bold");
            doc.text("3. Declaration", 14, y);

            doc.setFont("helvetica", "normal");
            y += 8;

            doc.text(
                "I hereby declare that the above information is true and correct to the best of my knowledge.",
                14, y
            );

            // SIGNATURE BOX
            y += 20;

            doc.rect(12, y, 80, 20);
            doc.rect(118, y, 80, 20);

            doc.text("Employee Signature", 20, y + 25);
            doc.text("Authorized Officer", 130, y + 25);

            // DATE
            y += 35;
            doc.text("Date: ___________________", 14, y);

            // SAVE
            doc.save("Medical_Reimbursement_Form.pdf");
        }    </script>

</body>

</html>
